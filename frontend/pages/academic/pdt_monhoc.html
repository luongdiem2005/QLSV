<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFee - Danh mục Môn học</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/form.css">
    <link rel="stylesheet" href="../../assets/css/pdt_table.css">
</head>
<body class="dashboard-page">

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="ti ti-school"></i>
                <h2>EduFee</h2>
            </div>
            <div class="sidebar-user-info">
                <p class="role-badge">Phòng Đào tạo</p>
                <h3 class="sidebar-username">Nguyễn Văn A</h3>
            </div>
            <nav class="sidebar-menu">
                <ul>
                    <li>
                        <a href="pdt.html">
                            <i class="ti ti-layout-dashboard"></i>
                            <span>Tổng quan</span>
                        </a>
                    </li>
                    <li>
                        <a href="pdt_sv.html">
                            <i class="ti ti-users"></i>
                            <span>Quản lý Sinh viên</span>
                        </a>
                    </li>
                    <li>
                        <a href="pdt_nganhhoc.html">
                            <i class="ti ti-building-community"></i>
                            <span>Quản lý Ngành học</span>
                        </a>
                    </li>
                    <li>
                      <a href="pdt_khoa.html">
                          <i class="ti ti-school"></i>
                          <span>Quản lý Khoa</span>
                      </a>
                    </li>
                    <li class="active">
                        <a href="pdt_monhoc.html">
                            <i class="ti ti-book"></i>
                            <span>Danh mục Môn học</span>
                        </a>
                    </li>
                    <li>
                        <a href="pdt_dkhp.html">
                            <i class="ti ti-clipboard-list"></i>
                            <span>Mở lớp Học phần</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="main-header">
                <div class="header-title">
                    <h1>Quản lý Danh mục Môn học</h1>
                </div>
                <div class="header-actions">
                    <!-- <button class="btn-icon" aria-label="Thông báo">
                        <i class="ti ti-bell"></i>
                        <span class="badge-dot"></span>
                    </button> -->
                    <button id="btnLogout" class="btn-logout">
                        <i class="ti ti-logout"></i>
                        <span>Đăng xuất</span>
                    </button>
                </div>
            </header>

            <main class="main-content">
                
                <div class="table-toolbar">
                    <div class="filter-group">
                      <div class="search-box">
                        <i class="ti ti-search"></i>
                        <input type="text" id="searchSubject" placeholder="Tìm theo mã môn hoặc tên môn học...">
                      </div>
                      <!-- JS đổ loại môn từ /api/loai-mon-hoc -->
                      <select id="filterType" class="form-select">
                        <option value="">-- Tất cả loại môn --</option>
                      </select>
                    </div>
                    <button class="btn btn-primary" id="btnOpenAddModal">
                      <i class="ti ti-book-upload"></i> <span>Thêm môn học mới</span>
                    </button>
                    <button id="btnExportExcel" class="btn btn-secondary">Xuất Excel</button>
                  </div>
                  
                  <div class="table-container">
                    <table class="data-table">
                      <thead>
                        <tr>
                          <th style="width:70px;">STT</th>
                          <th>Mã môn</th>
                          <th>Tên môn học</th>
                          <th class="text-center">Số tiết</th>
                          <th class="text-center">Số TC</th>
                          <th>Loại môn</th>
                          <th class="text-center">Thao tác</th>
                        </tr>
                      </thead>
                      <tbody id="subjectTableBody"></tbody>
                    </table>
                  </div>

                <div class="pagination-wrapper">
                    <p class="pagination-info">Hiển thị dữ liệu danh mục môn học</p>
                </div>
                <div id="shared-footer-container"></div>
            </main>
        </div>
    </div>

    <div id="subjectModal" class="modal-overlay hidden">
        <div class="modal-card">
          <div class="modal-header">
            <h3 id="modalTitle">Thêm môn học mới</h3>
            <button class="btn-close-modal" id="btnCloseModal"><i class="ti ti-x"></i></button>
          </div>
          <form id="subjectForm" novalidate>
            <div class="modal-body">
      
              <div class="form-row">
                <div class="form-group">
                  <label for="subjectId">Mã Môn Học *</label>
                  <input type="text" id="subjectId" name="subjectId" placeholder="Ví dụ: IT007" required>
                </div>
                <div class="form-group">
                  <label for="subjectName">Tên Môn Học *</label>
                  <input type="text" id="subjectName" name="subjectName" placeholder="Ví dụ: Hệ điều hành" required>
                </div>
              </div>
      
              <div class="form-row">
                <div class="form-group">
                  <label for="subjectLessons">Số Tiết Học *</label>
                  <input type="number" id="subjectLessons" name="subjectLessons" min="1" placeholder="Ví dụ: 45" required>
                </div>
                <div class="form-group">
                  <label for="subjectType">Loại Môn Học *</label>
                  <select id="subjectType" name="subjectType" required>
                    <option value="">-- Chọn loại môn --</option>
                  </select>
                </div>
              </div>
      
              <div class="form-row">
                <div class="form-group">
                  <label for="subjectDepartment">Khoa Phụ Trách *</label>
                  <select id="subjectDepartment" name="subjectDepartment" required>
                    <option value="">-- Chọn khoa --</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="subjectCredits">Số Tín Chỉ (tự động tính)</label>
                  <input type="number" id="subjectCredits" name="subjectCredits" readonly
                    style="background:#edf2f7;cursor:not-allowed;font-weight:600;color:#2b6cb0;">
                </div>
              </div>
      
              <div class="form-row">
                <div class="form-group" style="flex:1;">
                  <label for="subjectPrerequisite">Môn Học Trước</label>
                  <select id="subjectPrerequisite" name="subjectPrerequisite">
                    <option value="none">-- Không có môn học trước --</option>
                  </select>
                </div>
              </div>
      
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" id="btnCancelModal">Hủy</button>
              <button type="submit" class="btn btn-primary">Lưu</button>
            </div>
          </form>
        </div>
      </div>
    <script src="../../../js/api.js"></script>
    <script src="../../../js/auth-guard.js"></script>
    <script src="../../../js/pdt_monhoc.js"></script>
    <script src="../../assets/js/pdt_dashboard.js"></script>
    <script src="../../assets/js/pdt_monhoc.js"></script>
    <script src="../../../js/export-excel.js"></script>
    <script src="../../../js/pdt_monhoc.js"></script>   <!-- đổi theo trang -->
</body>
</html>
