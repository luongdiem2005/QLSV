<!DOCTYPE html>
<html lang="vi">
<head>

    <title>EduFee - Quản lý Hồ sơ Sinh viên</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

                    </li>
                    <li>
                        <a href="pdt_khoa.html">

                    </li>
                    <li>
                        <a href="pdt_nganhhoc.html">
                            <i class="ti ti-building-community"></i>

                        </a>
                    </li>
                    <li>
                        <a href="pdt_monhoc.html">

                            <span>Danh mục Môn học</span>

                    </li>
                    <li>

                    </li>
                    <li>
                        <a href="pdt_diachi.html">
                            <i class="ti ti-map-pin"></i>

                    </li>
                    <li class="active"><a href="pdt_yeucau.html"><i class="ti ti-file-check"></i><span>Xét duyệt đơn</span></a></li>

                <div class="header-actions">
                    <button id="btnLogout" class="btn-logout"><i class="ti ti-logout"></i><span>Đăng xuất</span></button>
                </div>
            </header>

            <main class="main-content">
                <div class="table-toolbar" style="padding:0;margin-bottom:14px;">
                    <div class="filter-group">
                        <select id="filterStatus" class="form-select" style="width:200px;">
                            <option value="">-- Tất cả trạng thái --</option>
                            <option value="CHO_DUYET">Chờ duyệt</option>
                            <option value="DA_DUYET">Đã duyệt</option>
                            <option value="TU_CHOI">Từ chối</option>

                    </div>

                <div class="table-container">

                            <tr>
                                <th>Mã Đơn</th>
                                <th>MSSV</th>
                                <th>Họ và tên</th>
                                <th>Loại</th>
                                <th>Lý do</th>
                                <th>Ngày tạo</th>

                                <th class="text-center">Hành động</th>
