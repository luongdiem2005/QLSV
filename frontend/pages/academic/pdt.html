<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFee - Tổng quan Phòng Đào tạo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/pdt.css">

    <script>
        (function() {
            const session = localStorage.getItem('edufee_session');
            if (!session) {
                alert('Vui lòng đăng nhập để truy cập hệ thống!');
                window.location.href = '../../index.html';
                return;
            }
            const userData = JSON.parse(session);
            if (userData.role !== 'PDT') {
                alert('Bạn không có quyền truy cập vào phân hệ này!');
                window.location.href = '../../index.html';
            }
        })();
    </script>
</head>
<body class="dashboard-page">

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="ti ti-school"></i>
                <h2>EduFee</h2>
            </div>
            <div class="sidebar-user-info">
                <p class="role-badge">Phòng Đào tạo</p>
                <h3 id="sidebar-username">Cán bộ PDT</h3>
            </div>
            <nav class="sidebar-menu">
                <ul>
                    <li class="active">
                        <a href="pdt.html">
                            <i class="ti ti-layout-dashboard"></i>
                            <span>Tổng quan</span>
                        </a>
                    </li>
                    <li>
                        <a href="pdt_sv.html">
                            <i class="ti ti-users"></i>
                            <span>Quản lý Sinh viên</span>
                        </a>
                    </li>
                    <li>
                        <a href="pdt_nganhhoc.html">
                            <i class="ti ti-building-community"></i>
                            <span>Quản lý Ngành học</span>
                        </a>
                    </li>
                    <li>
                        <a href="pdt_monhoc.html">
                            <i class="ti ti-book"></i>
                            <span>Danh mục Môn học</span>
                        </a>
                    </li>
                    <li>
                        <a href="pdt_dkhp.html">
                            <i class="ti ti-clipboard-list"></i>
                            <span>Mở lớp Học phần</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="main-header">
                <div class="header-title">
                    <h1>Trang quản trị tổng quan</h1>
                </div>
                <div class="header-actions">
                    <button class="btn-icon" aria-label="Thông báo">
                        <i class="ti ti-bell"></i>
                        <span class="badge-dot"></span>
                    </button>
                    <button id="btnLogout" class="btn-logout">
                        <i class="ti ti-logout"></i>
                        <span>Đăng xuất</span>
                    </button>
                </div>
            </header>

            <main class="main-content">
                <section class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-icon bg-blue">
                            <i class="ti ti-user-check"></i>
                        </div>
                        <div class="metric-info">
                            <p class="metric-label">Tổng số sinh viên</p>
                            <h2 class="metric-value">1,250</h2>
                        </div>
                    </div>

                    <div class="metric-card">
                        <div class="metric-icon bg-green">
                            <i class="ti ti-book-2"></i>
                        </div>
                        <div class="metric-info">
                            <p class="metric-label">Môn học đang mở</p>
                            <h2 class="metric-value">45</h2>
                        </div>
                    </div>

                    <div class="metric-card">
                        <div class="metric-icon bg-orange">
                            <i class="ti ti-discount-check"></i>
                        </div>
                        <div class="metric-info">
                            <p class="metric-label">Đã hoàn thành ĐKHP</p>
                            <h2 class="metric-value">85%</h2>
                        </div>
                    </div>
                </section>

                <section class="dashboard-charts-row">
                    <div class="chart-container-card">
                        <h3>Thống kê số lượng đăng ký môn học theo học kỳ</h3>
                        <div class="chart-wrapper">
                            <canvas id="semesterChart"></canvas>
                        </div>
                    </div>
                </section>
                <div id="shared-footer-container"></div>
            </main>
        </div>
    </div>

    <script src="../../assets/js/navigation.js"></script>
    <script src="../../assets/js/pdt_dashboard.js"></script>
</body>
</html>
