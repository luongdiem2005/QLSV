<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFee - Quản lý Hồ sơ Sinh viên</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/form.css">
    <link rel="stylesheet" href="../../assets/css/pdt_table.css">
    
    
</head>
<body class="dashboard-page">

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="ti ti-school"></i>
                <h2>EduFee</h2>
            </div>
            <div class="sidebar-user-info">
                <p class="role-badge">Phòng Đào tạo</p>
                <h3 class="sidebar-username">Nguyễn Văn A</h3>
            </div>
            <nav class="sidebar-menu">
                <ul>
                    <li>
                        <a href="pdt.html">
                            <i class="ti ti-layout-dashboard"></i>
                            <span>Tổng quan</span>
                        </a>
                    </li>
                    <li class="active">
                        <a href="pdt_sv.html">
                            <i class="ti ti-users"></i>
                            <span>Quản lý Sinh viên</span>
                        </a>
                    </li>
                    <li>
                        <a href="pdt_nganhhoc.html">
                            <i class="ti ti-building-community"></i>
                            <span>Quản lý Ngành học</span>
                        </a>
                    </li>
                    <li>
                        <a href="pdt_monhoc.html">
                            <i class="ti ti-book"></i>
                            <span>Danh mục Môn học</span>
                        </a>
                    </li>
                    <li>
                        <a href="pdt_dkhp.html">
                            <i class="ti ti-clipboard-list"></i>
                            <span>Mở lớp Học phần</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="main-header">
                <div class="header-title">
                    <h1>Quản lý Hồ sơ Sinh viên</h1>
                </div>
                <div class="header-actions">
                    <!-- <button class="btn-icon" aria-label="Thông báo">
                        <i class="ti ti-bell"></i>
                        <span class="badge-dot"></span>
                    </button> -->
                    <button id="btnLogout" class="btn-logout">
                        <i class="ti ti-logout"></i>
                        <span>Đăng xuất</span>
                    </button>
                </div>
            </header>

            <main class="main-content">
                
                <div class="table-toolbar">
                    <div class="filter-group">
                      <div class="search-box">
                        <i class="ti ti-search"></i>
                        <input type="text" id="searchStudent" placeholder="Tìm theo MSSV hoặc Họ tên...">
                      </div>
                      <!-- Bộ lọc theo NGÀNH (JS tự đổ danh sách từ /api/nganh) -->
                      <select id="filterClass" class="form-select">
                        <option value="">-- Tất cả ngành --</option>
                      </select>
                      <button id="btnExportExcel" class="btn btn-secondary">Xuất Excel</button>
                    </div>
                    <button class="btn btn-primary" id="btnOpenAddModal">
                      <i class="ti ti-user-plus"></i> <span>Thêm sinh viên mới</span>
                    </button>
                </div>
                  
                <div class="table-container">
                    <table class="data-table">
                      <thead>
                        <tr>
                          <th>STT</th>
                          <th>MSSV</th>
                          <th>Họ và Tên</th>
                          <th>Ngày sinh</th>
                          <th>Giới tính</th>
                          <th>SĐT</th>
                          <th>Email</th>
                          <th>Ngành học</th>
                          <th>Tình trạng</th>
                          <th class="text-center">Thao tác</th>
                        </tr>
                      </thead>
                      <tbody id="studentTableBody"></tbody>
                    </table>
                </div>
                <div id="shared-footer-container"></div>
            </main>
        </div>
    </div>

    <div id="studentModal" class="modal-overlay hidden">
        <div class="modal-card">
          <div class="modal-header">
            <h3 id="modalTitle">Thêm sinh viên mới</h3>
            <button class="btn-close-modal" id="btnCloseModal"><i class="ti ti-x"></i></button>
          </div>
          <form id="studentForm" novalidate>
            <div class="modal-body">
      
              <div class="form-row">
                <div class="form-group">
                  <label for="studentId">Mã số sinh viên (MSSV) *</label>
                  <input type="text" id="studentId" name="studentId" placeholder="Ví dụ: 23520001" required>
                </div>
                <div class="form-group">
                  <label for="studentName">Họ và Tên *</label>
                  <input type="text" id="studentName" name="studentName" required>
                </div>
              </div>
      
              <div class="form-row">
                <div class="form-group">
                  <label for="studentDob">Ngày sinh</label>
                  <input type="date" id="studentDob" name="studentDob">
                </div>
                <div class="form-group">
                  <label for="studentGender">Giới tính</label>
                  <select id="studentGender" name="studentGender">
                    <option value="">-- Chọn giới tính --</option>
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                  </select>
                </div>
              </div>
      
              <div class="form-row">
                <div class="form-group">
                  <label for="studentPhone">Số điện thoại</label>
                  <input type="text" id="studentPhone" name="studentPhone" placeholder="09xxxxxxxx">
                </div>
                <div class="form-group">
                  <label for="studentEmail">Email</label>
                  <input type="email" id="studentEmail" name="studentEmail" placeholder="abc@example.com">
                </div>
              </div>
      
              <div class="form-row">
                <div class="form-group">
                  <label for="studentMajor">Ngành học *</label>
                  <select id="studentMajor" name="studentMajor" required>
                    <option value="">-- Chọn ngành --</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="studentDoiTuong">Đối tượng ưu tiên</label>
                  <select id="studentDoiTuong" name="studentDoiTuong">
                    <option value="">-- Không ưu tiên --</option>
                  </select>
                </div>
              </div>
      
              <div class="form-row">
                <div class="form-group">
                  <label for="studentXa">Xã / Phường</label>
                  <select id="studentXa" name="studentXa">
                    <option value="">-- Chọn xã/phường --</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="studentStatus">Tình trạng</label>
                  <select id="studentStatus" name="studentStatus">
                    <option value="Đang học">Đang học</option>
                    <option value="Bảo lưu">Bảo lưu</option>
                    <option value="Thôi học">Thôi học</option>
                  </select>
                </div>
              </div>
      
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" id="btnCancelModal">Hủy</button>
              <button type="submit" class="btn btn-primary">Lưu</button>
            </div>
          </form>
        </div>
    </div>
    <script src="../../../js/api.js"></script>
    <script src="../../../js/auth-guard.js"></script>
    <script src="../../../js/pdt_sv.js"></script>
    <script src="../../assets/js/pdt_dashboard.js"></script>
    <script src="../../assets/js/pdt_sv.js"></script>
    <script src="../../../js/export-excel.js"></script>
    <script src="../../../js/pdt_sv.js"></script>   <!-- đổi theo trang -->
</body>
</html>
